<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XV Planner Ultra Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root{
--rosa:#ff4f87;
--rosa2:#ff85a2;
--dorado:#ffd166;
--verde:#00b894;
--rojo:#ff4d4d;
--glass:rgba(255,255,255,.75);
--gris:#666;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Outfit',sans-serif;
}

body{

background:
radial-gradient(circle at top left,#ffd6e7 0%,transparent 25%),
radial-gradient(circle at bottom right,#ffe7b8 0%,transparent 25%),
linear-gradient(135deg,#fff5f8,#fff,#fff8ef);

padding:20px;
min-height:100vh;

}

.container{
max-width:1500px;
margin:auto;
}

header{
text-align:center;
margin-bottom:30px;
}

header h1{

font-size:4rem;

background:linear-gradient(
135deg,
var(--rosa),
var(--rosa2),
var(--dorado)
);

background-clip:text;
-webkit-background-clip:text;

color:transparent;
-webkit-text-fill-color:transparent;

}

header p{
color:var(--gris);
margin-top:10px;
font-size:1.1rem;
}

.card{

background:var(--glass);

backdrop-filter:blur(14px);

padding:25px;

border-radius:28px;

margin-bottom:20px;

box-shadow:0 8px 25px rgba(0,0,0,.08);

}

.dashboard{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:20px;

}

.stat{
text-align:center;
}

.stat h2{
font-size:2rem;
margin-top:10px;
}

.tabs{

display:flex;
gap:10px;
overflow:auto;
margin-bottom:20px;
padding-bottom:5px;

}

.tab{

border:none;
padding:14px 18px;
border-radius:14px;
background:white;
cursor:pointer;
font-weight:600;
white-space:nowrap;

}

.tab.active{

background:linear-gradient(
135deg,
var(--rosa),
var(--rosa2)
);

color:white;

}

.section{
display:none;
}

.section.active{
display:block;
}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:15px;

margin-top:15px;

}

input,
select,
textarea{

width:100%;
padding:14px;
border:none;
border-radius:14px;
outline:none;
background:white;
font-size:1rem;

}

button{

border:none;
padding:14px;
border-radius:14px;
cursor:pointer;
font-weight:600;
transition:.2s;
font-size:1rem;

}

button:hover{
transform:translateY(-2px);
}

.btn-primary{

background:linear-gradient(
135deg,
var(--rosa),
var(--rosa2)
);

color:white;

}

.btn-success{
background:var(--verde);
color:white;
}

.btn-danger{
background:var(--rojo);
color:white;
}

.btn-gold{
background:var(--dorado);
color:#333;
}

.list{

display:grid;
gap:15px;
margin-top:20px;

}

.item{

background:white;
padding:18px;
border-radius:18px;

display:flex;
justify-content:space-between;
align-items:center;

gap:15px;

}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

table{

width:100%;
margin-top:20px;
border-collapse:collapse;

}

th{

background:var(--rosa);
color:white;
padding:14px;

}

td{

background:white;
padding:14px;
text-align:center;

}

canvas{

margin-top:20px;
background:white;
padding:10px;
border-radius:20px;

}

.progress{

height:24px;
background:#eee;
border-radius:20px;
overflow:hidden;
margin-top:20px;

}

.progress-bar{

height:100%;
width:0%;

background:linear-gradient(
90deg,
var(--rosa),
var(--dorado)
);

transition:.4s;

}

.toast{

position:fixed;
bottom:30px;
right:30px;

background:#111;
color:white;

padding:15px 20px;

border-radius:14px;

opacity:0;

transform:translateY(20px);

transition:.3s;

z-index:999;

}

.toast.show{
opacity:1;
transform:translateY(0);
}

.presupuesto-box{

background:white;
padding:20px;
border-radius:20px;
margin-top:15px;

}

.presupuesto-actions{

display:flex;
gap:15px;
flex-wrap:wrap;

}

.presupuesto-actions input{
flex:1;
min-width:200px;
}

.badge{

padding:6px 12px;
border-radius:999px;
font-size:.85rem;
font-weight:600;

}

.badge-success{
background:#d4f8e8;
color:#008f63;
}

.badge-warning{
background:#fff2cc;
color:#a86d00;
}

.locked{
opacity:.7;
border:2px solid var(--dorado);
}

@media(max-width:768px){

header h1{
font-size:2.5rem;
}

.item{
flex-direction:column;
align-items:flex-start;
}

.presupuesto-actions{
flex-direction:column;
}

}

</style>
</head>

<body>

<div class="container">

<header>

<h1>✨ XV Planner Ultra Premium ✨</h1>

<p>Planeador inteligente para XV años</p>

</header>

<div class="dashboard">

<div class="card stat">
💰
<h2 id="presupuestoView">$0</h2>
<p>Presupuesto</p>
</div>

<div class="card stat">
🧾
<h2 id="gastadoView">$0</h2>
<p>Gastado</p>
</div>

<div class="card stat">
💵
<h2 id="restanteView">$0</h2>
<p>Restante</p>
</div>

<div class="card stat">
👥
<h2 id="invitadosCount">0</h2>
<p>Invitados</p>
</div>

</div>

<div class="card">

<h2>💸 Administrar Presupuesto</h2>

<div class="presupuesto-box">

<div class="presupuesto-actions">

<input
type="number"
id="presupuestoInput"
placeholder="Escribe una cantidad">

<button
class="btn-success"
onclick="guardarPresupuesto()">

➕ Agregar Dinero

</button>

<button
class="btn-danger"
onclick="restarPresupuesto()">

➖ Quitar Dinero

</button>

</div>

<div class="progress">
<div class="progress-bar" id="barra"></div>
</div>

<p id="porcentaje">0%</p>

</div>

</div>

<button
class="btn-gold"
onclick="fijarTodo()">

📌 Fijar Todo

</button>

<div class="tabs">

<button class="tab active"
onclick="showSection('inicio',this)">
🏠 Inicio
</button>

<button class="tab"
onclick="showSection('gastos',this)">
🧾 Gastos
</button>

<button class="tab"
onclick="showSection('invitados',this)">
👥 Invitados
</button>

<button class="tab"
onclick="showSection('padrinos',this)">
🎁 Padrinos
</button>

<button class="tab"
onclick="showSection('playlist',this)">
🎵 Playlist
</button>

</div>

<div class="section active" id="inicio">

<div class="grid">

<div class="card">
<h3>📊 Gastos</h3>
<canvas id="graficaGastos"></canvas>
</div>

<div class="card">
<h3>👥 Invitados</h3>
<canvas id="graficaInvitados"></canvas>
</div>

<div class="card">
<h3>🎁 Padrinos</h3>
<canvas id="graficaPadrinos"></canvas>
</div>

</div>

</div>

<div class="section" id="gastos">

<div class="card">

<h2>🧾 Gastos</h2>

<div class="grid">

<input
type="text"
id="concepto"
placeholder="Concepto">

<select id="categoria">

<option>Salón</option>
<option>Vestido</option>
<option>DJ</option>
<option>Decoración</option>
<option>Fotografía</option>
<option>Banquete</option>
<option>Pastel</option>
<option>Maquillaje</option>

</select>

<input
type="number"
id="monto"
placeholder="Monto">

<button
class="btn-primary"
onclick="agregarGasto()">

Agregar

</button>

<button
class="btn-success"
onclick="exportarPDF('gastos')">

PDF

</button>

</div>

<table>

<thead>

<tr>

<th>Concepto</th>
<th>Categoría</th>
<th>Monto</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="tablaGastos"></tbody>

</table>

</div>

</div>

<div class="section" id="invitados">

<div class="card">

<h2>👥 Invitados</h2>

<div class="grid">

<input
type="text"
id="nombreInvitado"
placeholder="Nombre">

<button
class="btn-primary"
onclick="agregarInvitado()">

Agregar

</button>

<button
class="btn-success"
onclick="exportarPDF('invitados')">

PDF

</button>

</div>

<div class="list" id="listaInvitados"></div>

</div>

</div>

<div class="section" id="padrinos">

<div class="card">

<h2>🎁 Padrinos</h2>

<div class="grid">

<input
type="text"
id="nombrePadrino"
placeholder="Nombre">

<input
type="text"
id="aportePadrino"
placeholder="Aporte">

<button
class="btn-primary"
onclick="agregarPadrino()">

Agregar

</button>

<button
class="btn-success"
onclick="exportarPDF('padrinos')">

PDF

</button>

</div>

<div class="list" id="listaPadrinos"></div>

</div>

</div>

<div class="section" id="playlist">

<div class="card">

<h2>🎵 Playlist</h2>

<div class="grid">

<input
type="text"
id="cancion"
placeholder="Canción">

<button
class="btn-primary"
onclick="agregarCancion()">

Agregar

</button>

<button
class="btn-success"
onclick="exportarPDF('playlist')">

PDF

</button>

</div>

<div class="list" id="playlistContainer"></div>

</div>

</div>

</div>

<script>

let presupuesto =
Number(localStorage.getItem("presupuesto")) || 0;

let gastos =
JSON.parse(localStorage.getItem("gastos")) || [];

let invitados =
JSON.parse(localStorage.getItem("invitados")) || [];

let padrinos =
JSON.parse(localStorage.getItem("padrinos")) || [];

let playlist =
JSON.parse(localStorage.getItem("playlist")) || [];

let plannerFijado =
JSON.parse(localStorage.getItem("plannerFijado")) || false;

function guardarLocalStorage(){

localStorage.setItem(
"presupuesto",
presupuesto
);

localStorage.setItem(
"gastos",
JSON.stringify(gastos)
);

localStorage.setItem(
"invitados",
JSON.stringify(invitados)
);

localStorage.setItem(
"padrinos",
JSON.stringify(padrinos)
);

localStorage.setItem(
"playlist",
JSON.stringify(playlist)
);

localStorage.setItem(
"plannerFijado",
JSON.stringify(plannerFijado)
);

}

function toast(texto){

let div = document.createElement("div");

div.className = "toast";

div.innerText = texto;

document.body.appendChild(div);

setTimeout(()=>{
div.classList.add("show");
},100);

setTimeout(()=>{
div.remove();
},3000);

}

function verificarFijado(){

if(plannerFijado){

toast("El planner está fijado 📌");

return true;

}

return false;

}

function showSection(id,btn){

document.querySelectorAll(".section")
.forEach(sec=>sec.classList.remove("active"));

document.getElementById(id)
.classList.add("active");

document.querySelectorAll(".tab")
.forEach(tab=>tab.classList.remove("active"));

btn.classList.add("active");

}

function guardarPresupuesto(){

if(verificarFijado()) return;

let cantidad = Number(
document.getElementById("presupuestoInput").value
);

if(cantidad <= 0){

toast("Ingresa una cantidad válida");

return;

}

presupuesto += cantidad;

guardarLocalStorage();

actualizarDashboard();

toast("Dinero agregado 💰");

document.getElementById("presupuestoInput").value = "";

}

function restarPresupuesto(){

if(verificarFijado()) return;

let cantidad = Number(
document.getElementById("presupuestoInput").value
);

if(cantidad <= 0){

toast("Ingresa una cantidad válida");

return;

}

presupuesto -= cantidad;

if(presupuesto < 0){
presupuesto = 0;
}

guardarLocalStorage();

actualizarDashboard();

toast("Dinero removido 💸");

document.getElementById("presupuestoInput").value = "";

}

function agregarGasto(){

if(verificarFijado()) return;

let concepto =
document.getElementById("concepto").value;

let categoria =
document.getElementById("categoria").value;

let monto =
Number(document.getElementById("monto").value);

if(!concepto || monto <= 0){

toast("Completa todos los campos");

return;

}

gastos.push({
concepto,
categoria,
monto
});

guardarLocalStorage();

renderGastos();

actualizarDashboard();

actualizarGraficas();

toast("Gasto agregado");

}

function eliminarGasto(index){

if(verificarFijado()) return;

gastos.splice(index,1);

guardarLocalStorage();

renderGastos();

actualizarDashboard();

actualizarGraficas();

toast("Gasto eliminado");

}

function renderGastos(){

let tabla =
document.getElementById("tablaGastos");

tabla.innerHTML = "";

gastos.forEach((g,index)=>{

tabla.innerHTML += `

<tr>

<td>${g.concepto}</td>

<td>${g.categoria}</td>

<td>$${g.monto}</td>

<td>

<button
class="btn-danger"
onclick="eliminarGasto(${index})">

X

</button>

</td>

</tr>

`;

});

}

function agregarInvitado(){

if(verificarFijado()) return;

let nombre =
document.getElementById("nombreInvitado").value;

if(!nombre){

toast("Ingresa un nombre");

return;

}

invitados.push({
nombre,
confirmado:false
});

guardarLocalStorage();

renderInvitados();

actualizarDashboard();

actualizarGraficas();

toast("Invitado agregado");

}

function toggleInvitado(index){

if(verificarFijado()) return;

invitados[index].confirmado =
!invitados[index].confirmado;

guardarLocalStorage();

renderInvitados();

actualizarGraficas();

}

function eliminarInvitado(index){

if(verificarFijado()) return;

invitados.splice(index,1);

guardarLocalStorage();

renderInvitados();

actualizarDashboard();

actualizarGraficas();

}

function renderInvitados(){

let lista =
document.getElementById("listaInvitados");

lista.innerHTML = "";

invitados.forEach((inv,index)=>{

lista.innerHTML += `

<div class="item">

<div>

<strong>${inv.nombre}</strong>

<br><br>

<span class="badge ${
inv.confirmado
? 'badge-success'
: 'badge-warning'
}">

${
inv.confirmado
? 'Confirmado'
: 'Pendiente'
}

</span>

</div>

<div class="actions">

<button
class="${
inv.confirmado
? 'btn-success'
: 'btn-primary'
}"

onclick="toggleInvitado(${index})">

${inv.confirmado ? 'Confirmado':'Pendiente'}

</button>

<button
class="btn-danger"
onclick="eliminarInvitado(${index})">

X

</button>

</div>

</div>

`;

});

}

function agregarPadrino(){

if(verificarFijado()) return;

let nombre =
document.getElementById("nombrePadrino").value;

let aporte =
document.getElementById("aportePadrino").value;

if(!nombre || !aporte){

toast("Completa todos los campos");

return;

}

padrinos.push({
nombre,
aporte,
sellado:false
});

guardarLocalStorage();

renderPadrinos();

actualizarGraficas();

toast("Padrino agregado");

}

function editarPadrino(index){

if(verificarFijado()) return;

if(padrinos[index].sellado){

toast("Este padrino está sellado 🔒");

return;

}

let nuevoNombre = prompt(
"Editar nombre",
padrinos[index].nombre
);

let nuevoAporte = prompt(
"Editar aporte",
padrinos[index].aporte
);

if(nuevoNombre !== null){
padrinos[index].nombre = nuevoNombre;
}

if(nuevoAporte !== null){
padrinos[index].aporte = nuevoAporte;
}

guardarLocalStorage();

renderPadrinos();

actualizarGraficas();

toast("Padrino editado");

}

function sellarPadrino(index){

if(verificarFijado()) return;

padrinos[index].sellado = true;

guardarLocalStorage();

renderPadrinos();

toast("Padrino sellado 🔒");

}

function eliminarPadrino(index){

if(verificarFijado()) return;

if(padrinos[index].sellado){

toast("No puedes eliminar un padrino sellado");

return;

}

padrinos.splice(index,1);

guardarLocalStorage();

renderPadrinos();

actualizarGraficas();

toast("Padrino eliminado");

}

function renderPadrinos(){

let lista =
document.getElementById("listaPadrinos");

lista.innerHTML = "";

padrinos.forEach((p,index)=>{

lista.innerHTML += `

<div class="item ${
p.sellado ? 'locked' : ''
}">

<div>

<strong>
${p.nombre}
${p.sellado ? ' 🔒' : ''}
</strong>

<br><br>

🎁 ${p.aporte}

</div>

<div class="actions">

<button
class="btn-primary"
onclick="editarPadrino(${index})">

Editar

</button>

${
!p.sellado
? `
<button
class="btn-success"
onclick="sellarPadrino(${index})">

Sellar

</button>
`
: ''
}

<button
class="btn-danger"
onclick="eliminarPadrino(${index})">

X

</button>

</div>

</div>

`;

});

}

function agregarCancion(){

if(verificarFijado()) return;

let cancion =
document.getElementById("cancion").value;

if(!cancion){

toast("Escribe una canción");

return;

}

playlist.push(cancion);

guardarLocalStorage();

renderPlaylist();

toast("Canción agregada");

}

function eliminarCancion(index){

if(verificarFijado()) return;

playlist.splice(index,1);

guardarLocalStorage();

renderPlaylist();

toast("Canción eliminada");

}

function renderPlaylist(){

let container =
document.getElementById("playlistContainer");

container.innerHTML = "";

playlist.forEach((song,index)=>{

container.innerHTML += `

<div class="item">

<div>🎵 ${song}</div>

<button
class="btn-danger"
onclick="eliminarCancion(${index})">

X

</button>

</div>

`;

});

}

function fijarTodo(){

plannerFijado = true;

guardarLocalStorage();

toast("Todo quedó fijado 📌");

}

function actualizarDashboard(){

let gastado = 0;

gastos.forEach(g=>{
gastado += g.monto;
});

document.getElementById("presupuestoView")
.innerText = "$" + presupuesto;

document.getElementById("gastadoView")
.innerText = "$" + gastado;

document.getElementById("restanteView")
.innerText =
"$" + (presupuesto - gastado);

document.getElementById("invitadosCount")
.innerText = invitados.length;

let porcentaje =
presupuesto > 0
? (gastado/presupuesto)*100
: 0;

document.getElementById("barra")
.style.width =
porcentaje + "%";

document.getElementById("porcentaje")
.innerText =
porcentaje.toFixed(1) + "%";

}

let chart1;
let chart2;
let chart3;

function actualizarGraficas(){

let categorias = {};

gastos.forEach(g=>{

categorias[g.categoria] =
(categorias[g.categoria] || 0) + g.monto;

});

if(chart1) chart1.destroy();

chart1 = new Chart(
document.getElementById("graficaGastos"),
{
type:'doughnut',

data:{
labels:Object.keys(categorias),

datasets:[{
data:Object.values(categorias)
}]
}

}
);

let confirmados =
invitados.filter(i=>i.confirmado).length;

let pendientes =
invitados.length - confirmados;

if(chart2) chart2.destroy();

chart2 = new Chart(
document.getElementById("graficaInvitados"),
{
type:'pie',

data:{
labels:['Confirmados','Pendientes'],

datasets:[{
data:[confirmados,pendientes]
}]
}

}
);

if(chart3) chart3.destroy();

chart3 = new Chart(
document.getElementById("graficaPadrinos"),
{
type:'bar',

data:{

labels:padrinos.map(p=>p.nombre),

datasets:[{
data:padrinos.map(()=>1)
}]

}

}
);

}

function exportarPDF(tipo){

const { jsPDF } = window.jspdf;

const doc = new jsPDF();

doc.setFontSize(22);

doc.text(
"XV Planner Ultra Premium",
20,
20
);

doc.setFontSize(14);

let y = 40;

if(tipo === 'gastos'){

doc.text("Lista de Gastos",20,y);

y += 10;

gastos.forEach(g=>{

doc.text(
`${g.concepto} | ${g.categoria} | $${g.monto}`,
20,
y
);

y += 10;

});

}

if(tipo === 'invitados'){

doc.text("Lista de Invitados",20,y);

y += 10;

invitados.forEach(i=>{

doc.text(
`${i.nombre} - ${
i.confirmado
? 'Confirmado'
: 'Pendiente'
}`,
20,
y
);

y += 10;

});

}

if(tipo === 'padrinos'){

doc.text("Lista de Padrinos",20,y);

y += 10;

padrinos.forEach(p=>{

doc.text(
`${p.nombre} - ${p.aporte} ${
p.sellado ? '🔒' : ''
}`,
20,
y
);

y += 10;

});

}

if(tipo === 'playlist'){

doc.text("Playlist",20,y);

y += 10;

playlist.forEach(song=>{

doc.text(song,20,y);

y += 10;

});

}

doc.save(tipo + ".pdf");

}

renderGastos();

renderInvitados();

renderPadrinos();

renderPlaylist();

actualizarDashboard();

actualizarGraficas();

</script>

</body>
</html>
